<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>منير رقم 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://sdk.twilio.com/js/voice/v2.1.1/twilio.min.js"></script>
    <style>
        :root {
            --primary:   #1a237e;
            --primary-d: #000051;
            --primary-l: #534bae;
            --green:     #2e7d32;
            --red:       #c62828;
            --gold:      #ffd600;
            --bg:        #f0f2f5;
            --white:     #ffffff;
            --dark:      #212121;
            --gray:      #757575;
            --shadow:    0 4px 12px rgba(0,0,0,0.12);
            --radius:    16px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #0d0d0d; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

        #app {
            width: 100%; max-width: 414px; height: 100vh; max-height: 896px;
            background: var(--bg); position: relative; overflow: hidden;
            display: flex; flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.6);
        }

        /* ========= SPLASH ========= */
        #splash {
            position: absolute; inset: 0;
            background: linear-gradient(145deg, var(--primary-d), var(--primary));
            z-index: 10000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: #fff;
            transition: opacity 0.6s ease;
        }
        .splash-icon { font-size: 5.5rem; animation: beat 1.8s infinite; }
        @keyframes beat {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.12); }
        }
        .splash-title { font-size: 2.2rem; font-weight: 800; margin-top: 18px; letter-spacing: 1px; }
        .splash-sub { opacity: 0.65; font-size: 1rem; margin-top: 8px; }

        /* ========= LOGIN ========= */
        #login-screen {
            position: absolute; inset: 0; background: var(--white);
            z-index: 9000; display: flex; flex-direction: column;
            padding: 40px 28px; overflow-y: auto;
        }
        .login-top { text-align: center; margin: 36px 0 36px; }
        .login-top i { font-size: 3.5rem; color: var(--primary); }
        .login-top h1 { font-size: 1.7rem; font-weight: 800; color: var(--primary-d); margin-top: 12px; }
        .login-top p { color: var(--gray); font-size: 0.9rem; margin-top: 5px; }
        .field { margin-bottom: 18px; }
        .field label { display: block; font-size: 0.88rem; font-weight: 600; color: var(--gray); margin-bottom: 7px; }
        .field input {
            width: 100%; padding: 15px 14px; border: 2px solid #e0e0e0;
            border-radius: var(--radius); font-size: 1rem; outline: none;
            transition: border-color 0.25s; text-align: right;
        }
        .field input:focus { border-color: var(--primary-l); }
        .btn-login {
            width: 100%; padding: 16px; background: var(--primary); color: #fff;
            border: none; border-radius: var(--radius); font-size: 1.1rem;
            font-weight: 700; cursor: pointer; margin-top: 8px;
            box-shadow: 0 6px 18px rgba(26,35,126,0.35);
        }
        .btn-login:active { transform: scale(0.98); }
        .login-note { text-align: center; margin-top: 24px; font-size: 0.82rem; color: #aaa; }

        /* ========= MAIN APP ========= */
        #main-app { flex: 1; display: flex; flex-direction: column; min-height: 0; }
        .page { flex: 1; display: none; flex-direction: column; overflow-y: auto; padding-bottom: 78px; }
        .page.active { display: flex; }

        /* DIALER */
        .dialer-top {
            background: var(--white); padding: 28px 20px 18px;
            text-align: center; border-bottom: 1px solid #e8e8e8;
        }
        .balance-pill {
            display: inline-flex; align-items: center; gap: 7px;
            background: #e8eaf6; color: var(--primary);
            padding: 7px 18px; border-radius: 30px;
            font-weight: 700; font-size: 0.9rem; cursor: pointer;
            margin-bottom: 18px; border: none;
        }
        .dial-num {
            font-size: 2.8rem; font-weight: 600; min-height: 60px;
            letter-spacing: 3px; color: var(--dark); word-break: break-all;
            display: flex; align-items: center; justify-content: center;
        }
        .keypad {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 18px; padding: 28px 38px; align-content: center; flex: 1;
        }
        .key {
            aspect-ratio: 1; background: var(--white); border: none;
            border-radius: 50%; font-size: 1.75rem; font-weight: 700;
            color: var(--primary-d); display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); cursor: pointer;
            transition: transform 0.1s, background 0.15s;
        }
        .key:active { transform: scale(0.9); background: #ebebeb; }
        .key-sub { font-size: 0.65rem; font-weight: 600; color: var(--gray); margin-top: -4px; }
        .action-bar { display: flex; align-items: center; justify-content: center; gap: 42px; padding: 16px 0 32px; }
        .btn-call {
            width: 78px; height: 78px; background: var(--green);
            color: #fff; border: none; border-radius: 50%;
            font-size: 2rem; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 20px rgba(46,125,50,0.35); cursor: pointer;
        }
        .btn-del { background: none; border: none; font-size: 1.8rem; color: var(--gray); cursor: pointer; }

        /* NAV */
        .bottom-nav {
            position: absolute; bottom: 0; width: 100%;
            height: 72px; background: var(--white);
            border-top: 1px solid #eee; display: flex;
            align-items: center; z-index: 500;
        }
        .nav-btn {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 4px; color: #bbb; font-size: 0.72rem;
            font-weight: 700; cursor: pointer; border: none; background: none;
            height: 100%; transition: color 0.2s;
        }
        .nav-btn i { font-size: 1.35rem; }
        .nav-btn.active { color: var(--primary); }

        /* PAGE HEADER */
        .page-hdr {
            background: var(--primary); color: #fff;
            padding: 18px 20px; text-align: center;
            font-weight: 700; font-size: 1.15rem;
            letter-spacing: 0.5px; flex-shrink: 0;
        }

        /* HISTORY LIST */
        .list-wrap { padding: 14px; }
        .list-card {
            background: var(--white); border-radius: var(--radius);
            margin-bottom: 12px; padding: 16px 14px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: var(--shadow);
        }
        .list-card h4 { font-size: 1rem; color: var(--dark); margin-bottom: 4px; }
        .list-card p { font-size: 0.82rem; color: var(--gray); }
        .list-cost { font-weight: 800; color: var(--red); }

        /* WALLET */
        .wallet-card {
            background: linear-gradient(145deg, var(--primary-d), var(--primary-l));
            margin: 20px; padding: 44px 20px; border-radius: 24px;
            color: #fff; text-align: center; box-shadow: var(--shadow);
        }
        .wallet-card p { opacity: 0.8; font-size: 0.95rem; }
        .wallet-card h2 { font-size: 3.2rem; font-weight: 800; margin: 10px 0; }
        .btn-topup {
            background: var(--gold); color: var(--primary-d);
            border: none; padding: 13px 32px; border-radius: 30px;
            font-weight: 800; font-size: 1rem; margin-top: 18px; cursor: pointer;
        }

        /* PROFILE */
        .profile-wrap { padding: 20px; }
        .info-card {
            background: var(--white); border-radius: var(--radius);
            padding: 16px 14px; margin-bottom: 14px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: var(--shadow);
        }
        .info-card .label { font-size: 0.88rem; color: var(--gray); margin-bottom: 4px; }
        .info-card .value { font-size: 1rem; font-weight: 700; color: var(--dark); }
        .btn-logout {
            width: 100%; padding: 15px; background: var(--red);
            color: #fff; border: none; border-radius: var(--radius);
            font-size: 1.05rem; font-weight: 700; margin-top: 30px; cursor: pointer;
        }

        /* CALL OVERLAY */
        #call-overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.93); z-index: 11000;
            color: #fff; display: none; flex-direction: column;
            align-items: center; justify-content: space-around; padding: 60px 20px;
        }
        .call-center { text-align: center; }
        .call-center h2 { font-size: 2.4rem; font-weight: 700; margin-bottom: 12px; }
        .call-status-text { font-size: 1.1rem; color: var(--gold); font-weight: 600; }
        .call-time { font-size: 3rem; font-weight: 200; margin-top: 20px; letter-spacing: 2px; }
        .btn-end {
            width: 78px; height: 78px; background: var(--red); color: #fff;
            border: none; border-radius: 50%; font-size: 2rem;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 24px rgba(198,40,40,0.45); cursor: pointer;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
<div id="app">

    <!-- SPLASH -->
    <div id="splash">
        <div class="splash-icon"><i class="fas fa-phone-alt"></i></div>
        <div class="splash-title">منير رقم 1</div>
        <div class="splash-sub">بوابتك للاتصال الخاص</div>
    </div>

    <!-- LOGIN -->
    <div id="login-screen" class="hidden">
        <div class="login-top">
            <i class="fas fa-shield-alt"></i>
            <h1>تسجيل الدخول</h1>
            <p>أدخل بياناتك للمتابعة</p>
        </div>
        <div class="field">
            <label>البريد الإلكتروني</label>
            <input type="email" id="login-email" placeholder="example@mail.com">
        </div>
        <div class="field">
            <label>كلمة المرور</label>
            <input type="password" id="login-pass" placeholder="••••••••">
        </div>
        <button class="btn-login" onclick="handleAuth()">دخول آمن</button>
        <p class="login-note">بالمتابعة أنت توافق على شروط الخدمة</p>
    </div>

    <!-- MAIN -->
    <div id="main-app" class="hidden">

        <!-- Dialer -->
        <section id="page-dialer" class="page active">
            <div class="dialer-top">
                <button class="balance-pill" onclick="goTab('page-wallet', navWallet)">
                    <i class="fas fa-wallet"></i>
                    <span id="bal-display">$0.00</span>
                </button>
                <div class="dial-num" id="dial-display"></div>
            </div>
            <div class="keypad">
                <button class="key" onclick="kp('1')">1<span class="key-sub"></span></button>
                <button class="key" onclick="kp('2')">2<span class="key-sub">ABC</span></button>
                <button class="key" onclick="kp('3')">3<span class="key-sub">DEF</span></button>
                <button class="key" onclick="kp('4')">4<span class="key-sub">GHI</span></button>
                <button class="key" onclick="kp('5')">5<span class="key-sub">JKL</span></button>
                <button class="key" onclick="kp('6')">6<span class="key-sub">MNO</span></button>
                <button class="key" onclick="kp('7')">7<span class="key-sub">PQRS</span></button>
                <button class="key" onclick="kp('8')">8<span class="key-sub">TUV</span></button>
                <button class="key" onclick="kp('9')">9<span class="key-sub">WXYZ</span></button>
                <button class="key" onclick="kp('*')">*</button>
                <button class="key" onclick="kp('0')">0<span class="key-sub">+</span></button>
                <button class="key" onclick="kp('#')">#</button>
            </div>
            <div class="action-bar">
                <div style="width:44px"></div>
                <button class="btn-call" onclick="makeCall()"><i class="fas fa-phone"></i></button>
                <button class="btn-del" onclick="delDigit()"><i class="fas fa-backspace"></i></button>
            </div>
        </section>

        <!-- Recents -->
        <section id="page-recents" class="page">
            <div class="page-hdr">سجل المكالمات</div>
            <div class="list-wrap" id="history-list"></div>
        </section>

        <!-- Wallet -->
        <section id="page-wallet" class="page">
            <div class="page-hdr">محفظتي</div>
            <div class="wallet-card">
                <p>الرصيد المتاح</p>
                <h2 id="wallet-display">$0.00</h2>
                <button class="btn-topup" onclick="alert('خدمة الشحن ستتوفر قريباً عبر PayPal')">شحن الرصيد</button>
            </div>
        </section>

        <!-- Profile -->
        <section id="page-profile" class="page">
            <div class="page-hdr">حسابي</div>
            <div class="profile-wrap">
                <div class="info-card">
                    <div>
                        <div class="label">رقم الحساب</div>
                        <div class="value" id="profile-num">---</div>
                    </div>
                    <i class="fas fa-id-badge" style="color:var(--primary);font-size:1.6rem;"></i>
                </div>
                <div class="info-card">
                    <div>
                        <div class="label">إصدار التطبيق</div>
                        <div class="value">V 1.0.0</div>
                    </div>
                    <i class="fas fa-info-circle" style="color:var(--gray);font-size:1.4rem;"></i>
                </div>
                <button class="btn-logout" onclick="doLogout()">تسجيل الخروج</button>
            </div>
        </section>

        <!-- Bottom Nav -->
        <nav class="bottom-nav">
            <button class="nav-btn active" id="navDialer" onclick="goTab('page-dialer', this)">
                <i class="fas fa-th"></i>لوحة
            </button>
            <button class="nav-btn" id="navRecents" onclick="goTab('page-recents', this); loadHistory()">
                <i class="fas fa-history"></i>السجل
            </button>
            <button class="nav-btn" id="navWallet" onclick="goTab('page-wallet', this)">
                <i class="fas fa-wallet"></i>محفظة
            </button>
            <button class="nav-btn" id="navProfile" onclick="goTab('page-profile', this)">
                <i class="fas fa-user-circle"></i>حسابي
            </button>
        </nav>

    </div><!-- /main-app -->

    <!-- CALL OVERLAY -->
    <div id="call-overlay">
        <div class="call-center">
            <h2 id="overlay-num">...</h2>
            <div class="call-status-text" id="overlay-status">جاري الاتصال...</div>
            <div class="call-time" id="overlay-timer">00:00</div>
        </div>
        <button class="btn-end" onclick="hangup()"><i class="fas fa-phone-slash"></i></button>
    </div>

</div><!-- /app -->

<script src="script.js"></script>
</body>
</html>
