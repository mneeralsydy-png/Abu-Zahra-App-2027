name: Abu Al-Zahra Final Success Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout Code ─────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── Set up Node.js 22 (Required for Capacitor 8) ──────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # تم التحديث إلى 22 لحل المشكلة
          cache: 'npm'

      # ── Install Dependencies ──────────────────────────────────────
      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/cli@latest
          npm install -D typescript

      # ── Capacitor Setup & Sync ────────────────────────────────────
      - name: Capacitor Setup & Sync
        run: |
          rm -rf android
          npx --yes @capacitor/cli add android
          npx --yes @capacitor/cli sync android

      # ── Create Google Services File ───────────────────────────────
      - name: Create Google Services File
        run: |
          mkdir -p android/app
          cat > android/app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "982107544824",
              "project_id": "call-now-24582",
              "storage_bucket": "call-now-24582.firebasestorage.app"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:982107544824:android:abuzahra00000001",
                  "android_client_info": {
                    "package_name": "com.munir.abuzahra"
                  }
                },
                "oauth_client": [
                  {
                    "client_id": "982107544824-android.apps.googleusercontent.com",
                    "client_type": 1,
                    "android_info": {
                      "package_name": "com.munir.abuzahra"
                    }
                  },
                  {
                    "client_id": "982107544824-web.apps.googleusercontent.com",
                    "client_type": 3
                  }
                ],
                "api_key": [
                  {
                    "current_key": "AIzaSyD8hrO2kX1zXaA46PImzMGqOt4iTwhXKI0"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": [
                      {
                        "client_id": "982107544824-web.apps.googleusercontent.com",
                        "client_type": 3
                      }
                    ]
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF
          echo "✅ google-services.json created"

      # ── Force Fix Android Variables ───────────────────────────────
      - name: Force Fix Android Variables
        run: |
          cat > android/variables.gradle << 'EOF'
          ext {
              minSdkVersion = 23
              compileSdkVersion = 36
              targetSdkVersion = 36
              androidxAppCompatVersion = '1.7.0'
              androidxCoordinatorLayoutVersion = '1.2.0'
              androidxCoreVersion = '1.12.0'
              androidxAnnotationVersion = '1.7.0'
              coreSplashScreenVersion = '1.0.1'
              googlePlayServicesLocationVersion = '21.0.1'
              junitVersion = '4.13.2'
              androidxJunitVersion = '1.1.5'
              androidxEspressoCoreVersion = '3.5.1'
              androidxMaterialVersion = '1.11.0'
              androidxBrowserVersion = '1.7.0'
          }
          EOF
          echo "android.suppressUnsupportedCompileSdk=36" >> android/gradle.properties
          echo "✅ Android variables fixed for SDK 36"

      # ── Set up JDK 21 ─────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # ── Build APK (Debug) ─────────────────────────────────────────
      - name: Build APK (Debug)
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4096m"

      # ── Get SHA1 Key ──────────────────────────────────────────────
      - name: Get SHA1 Key
        run: |
          keytool -list -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android 2>/dev/null \
          | grep "SHA1:" || echo "SHA1 key info not available"

      # ── Upload APK Artifact ───────────────────────────────────────
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AbuZahra-Debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error
