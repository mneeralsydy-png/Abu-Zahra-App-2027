name: Build Android APK (Private Dialer)

on:
  push:
    branches: [ main, master, dev ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install Dependencies
      run: |
        npm install
        npm install @capacitor/core @capacitor/cli @capacitor/android typescript -D

    - name: Capacitor Sync
      run: |
        rm -rf android
        npx cap init "Private Dialer" "com.privatedialer.app" --web-dir public --noprompt || true
        npx cap add android
        # مزامنة المكتبات والتأكد من تحديثها
        npx cap sync android

    - name: Fix Android SDK & Gradle
      run: |
        # تحديث الإصدارات لتتوافق مع متطلبات الأندرويد الحديثة
        if [ -f android/variables.gradle ]; then
          sed -i 's/compileSdkVersion = [0-9]*/compileSdkVersion = 35/g' android/variables.gradle
          sed -i 's/targetSdkVersion = [0-9]*/targetSdkVersion = 35/g' android/variables.gradle
        fi
        # إضافة إعدادات لتسريع البناء وتقليل استهلاك الذاكرة
        mkdir -p ~/.gradle
        echo "org.gradle.daemon=false" >> ~/.gradle/gradle.properties
        echo "org.gradle.jvmargs=-Xmx2048m" >> ~/.gradle/gradle.properties

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build APK (Debug)
      run: |
        cd android
        chmod +x gradlew
        # استخدام --no-daemon لتحسين الاستقرار في بيئة GitHub
        ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: Private-Dialer-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
