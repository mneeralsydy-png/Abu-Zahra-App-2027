name: Build Android APK (Private Dialer)

on:
  push:
    branches: [ main, master, dev ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install Dependencies
      run: |
        npm install
        npm install @capacitor/core @capacitor/cli @capacitor/android typescript -D

    - name: Build Web Assets
      run: |
        # التأكد من وجود المجلد العام
        mkdir -p public
        # هنا يمكنك إضافة أمر بناء المشروع إذا كنت تستخدم React أو Vue
        # npm run build 

    - name: Capacitor Sync
      run: |
        npx cap init "Private Dialer" "com.privatedialer.app" --web-dir public --noprompt || true
        npx cap add android || echo "Android platform exists"
        npx cap sync android

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build APK (Debug)
      run: |
        # التأكد من الدخول للمجلد الصحيح والبحث عن ملف gradlew
        cd android
        if [ -f "gradlew" ]; then
          chmod +x gradlew
          ./gradlew assembleDebug
        else
          echo "Error: gradlew not found in /android folder"
          ls -R # لعرض الملفات الموجودة للمساعدة في التشخيص
          exit 1
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Private-Dialer-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
