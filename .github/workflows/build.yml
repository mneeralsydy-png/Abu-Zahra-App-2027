name: Build Android APK (Private Dialer)

on:
  push:
    branches: [ main, master, dev ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install Dependencies
      run: |
        npm install
        # تثبيت الأدوات المطلوبة بشكل صريح وتثبيت TypeScript لحل المشكلة الأخيرة
        npm install @capacitor/core @capacitor/cli @capacitor/android typescript -D

    - name: Initialize Capacitor
      run: |
        npx cap init "Private Dialer" "com.privatedialer.app" --web-dir public --noprompt || true

    - name: Build Android Project
      run: |
        # إضافة المنصة ومزامنة الملفات
        npx cap add android || echo "Android platform already exists"
        npx cap copy android
        npx cap sync android

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build APK (Debug)
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Private-Dialer-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
