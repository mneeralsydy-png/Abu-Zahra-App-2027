name: Build Android APK (Private Dialer)

on:
  push:
    branches: [ main, master, dev ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install Dependencies
      run: |
        npm install
        npm install @capacitor/core @capacitor/cli @capacitor/android typescript -D

    - name: Build Web Assets
      run: |
        mkdir -p public
        # تأكد أن ملف index.html موجود في مجلد public
        if [ ! -f public/index.html ]; then echo "<html><body><h1>Private Dialer</h1></body></html>" > public/index.html; fi

    - name: Clean and Re-add Android Platform
      run: |
        # حذف المجلد القديم لضمان إعادة بناء ملفات Gradle من جديد
        rm -rf android
        npx cap init "Private Dialer" "com.privatedialer.app" --web-dir public --noprompt || true
        npx cap add android
        npx cap sync android

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build APK (Debug)
      run: |
        cd android
        # الآن ملف gradlew سيكون موجوداً بالتأكيد بعد عملية cap add
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Private-Dialer-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
