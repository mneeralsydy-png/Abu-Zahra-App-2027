name: Build Android APK (Final Success)

on:
  push:
    branches: [ main, master, dev ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x

    - name: Install Dependencies
      run: |
        npm install
        npm install @capacitor/core @capacitor/cli @capacitor/android typescript -D

    - name: Capacitor Sync
      run: |
        rm -rf android
        npx cap init "Private Dialer" "com.privatedialer.app" --web-dir public --noprompt || true
        npx cap add android
        npx cap sync android

    - name: Force Upgrade SDK & Plugin
      run: |
        # تحديث المتغيرات ورفع minSdkVersion إلى 23 لحل تعارض مكتبة الجيولكيشن
        cat <<EOF > android/variables.gradle
        ext {
            minSdkVersion = 23
            compileSdkVersion = 36
            targetSdkVersion = 36
            androidxActivityVersion = '1.9.2'
            androidxAppCompatVersion = '1.7.0'
            androidxCoordinatorLayoutVersion = '1.2.0'
            androidxCoreVersion = '1.13.1'
            androidxFragmentVersion = '1.8.3'
            coreSplashScreenVersion = '1.0.1'
            androidxResourceInspectionVersion = '1.0.1'
            junitVersion = '4.13.2'
            androidxJunitVersion = '1.2.1'
            androidxEspressoCoreVersion = '3.6.1'
            cordovaAndroidVersion = '10.1.1'
        }
        EOF

        # تحديث إصدار Gradle Plugin ليتوافق مع متطلبات المكتبات الحديثة
        sed -i 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.9.1/g' android/build.gradle
        
        # إضافة إعدادات التوافق وتخطي تحذيرات الـ SDK
        echo "android.suppressUnsupportedCompileSdk=36" >> android/gradle.properties
        echo "android.experimental.privacySandboxSdk.enable=false" >> android/gradle.properties

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build APK (Debug)
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: Private-Dialer-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
