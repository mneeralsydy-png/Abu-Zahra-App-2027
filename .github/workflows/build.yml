name: Build Android APK (Private Dialer)

on:
  push:
    branches: [ main, master, dev ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install Dependencies
      run: |
        npm install
        npm install @capacitor/core @capacitor/cli @capacitor/android typescript -D

    - name: Capacitor Sync
      run: |
        rm -rf android
        npx cap init "Private Dialer" "com.privatedialer.app" --web-dir public --noprompt || true
        npx cap add android
        npx cap sync android

    - name: Force Update Android SDK to 36
      run: |
        # تعديل ملف variables.gradle لفرض الإصدار 36
        if [ -f android/variables.gradle ]; then
          sed -i 's/compileSdkVersion = [0-9]*/compileSdkVersion = 36/g' android/variables.gradle
          sed -i 's/targetSdkVersion = [0-9]*/targetSdkVersion = 36/g' android/variables.gradle
          echo "Variables updated to SDK 36"
        fi
        
        # تعديل ملف build.gradle الرئيسي لرفع إصدار أداة البناء (Gradle Plugin)
        sed -i 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.7.2/g' android/build.gradle
        
        # إضافة إعدادات لتجاوز فحص المكتبات المتعارضة
        echo "android.experimental.privacySandboxSdk.enable=false" >> android/gradle.properties

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build APK (Debug)
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: Private-Dialer-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
