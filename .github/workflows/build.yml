name: Build and Test Private Dialer

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Security Audit
      run: npm audit --audit-level=high || echo "Audit finished with warnings"

    - name: Check Node.js version
      run: |
        node -v
        npm -v

    - name: Validate Scripts Syntax
      run: |
        node --check server.js
        if [ -f public/script.js ]; then node --check public/script.js; fi

    - name: Verify HTML structure
      run: |
        if [ -f public/index.html ]; then
          echo "index.html exists"
        else
          echo "index.html not found"
          exit 1
        fi

    - name: Check database initialization
      run: |
        timeout 10s node server.js & 
        sleep 5
        if [ -f database.db ]; then
          echo "Database created successfully"
        else
          echo "Database initialization failed"
          exit 1
        fi
        pkill -f "node server.js" || true

    - name: Build summary
      run: |
        echo "=========================================="
        echo "      Build Configuration Summary         "
        echo "=========================================="
        echo "Project: Private Dialer"
        echo "App ID: com.privatedialer.app"
        echo "Database: SQLite (database.db)"
        echo "=========================================="

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dialer-build-${{ matrix.node-version }}
        path: |
          database.db
          package-lock.json
