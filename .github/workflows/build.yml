name: Build Android APK (Abu Al-Zahra VoIP)

on:
  push:
    branches: [ main, master ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x

    - name: Install Dependencies
      run: |
        npm install
        npm install -D @capacitor/core @capacitor/cli @capacitor/android typescript

    # إنشاء ملف google-services.json من الأسرار لضمان الاتصال بالخادم
    - name: Create Google Services File
      run: |
        echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

    - name: Capacitor Sync
      run: npx cap sync android

    - name: Force Fix Android Configuration
      run: |
        # ضبط المتغيرات لضمان التوافق مع المكتبات الحديثة
        cat <<EOF > android/variables.gradle
        ext {
            minSdkVersion = 23
            compileSdkVersion = 36
            targetSdkVersion = 36
            coreSplashScreenVersion = '1.0.1'
        }
        EOF
        # تحديث إصدار Gradle Plugin ليتوافق مع Java 21
        sed -i 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.9.1/g' android/build.gradle
        echo "android.suppressUnsupportedCompileSdk=36" >> android/gradle.properties
        echo "android.experimental.privacySandboxSdk.enable=false" >> android/gradle.properties

    # رفع إصدار الجافا إلى 21 لتجنب خطأ "invalid source release"
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # استخراج مفتاح SHA-1 لربطه بـ Firebase وإصلاح خطأ الاتصال
    - name: Get SHA1 Key
      run: |
        cd android
        chmod +x gradlew
        ./gradlew signingReport | grep -A 5 "Variant: debug" || true

    - name: Build APK (Debug)
      run: |
        cd android
        ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Abu-Zahra-VoIP-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
