name: Build Android APK (Abu Al-Zahra Fixed)

on:
  push:
    branches: [ main, master ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x

    - name: Install Dependencies
      run: |
        npm install
        npm install -D @capacitor/core @capacitor/cli @capacitor/android typescript

    # خطوة جوهرية: بناء الويب ثم إضافة منصة الأندرويد لضمان وجود ملف gradlew
    - name: Build Web & Sync Android
      run: |
        npm run build --if-present
        npx cap add android || true
        npx cap sync android

    - name: Create Google Services File
      run: |
        mkdir -p android/app
        echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

    - name: Force Fix Android Configuration
      run: |
        # تحديث المتغيرات لضمان التوافق مع SDK 36
        cat <<EOF > android/variables.gradle
        ext {
            minSdkVersion = 23
            compileSdkVersion = 36
            targetSdkVersion = 36
            coreSplashScreenVersion = '1.0.1'
        }
        EOF
        
        # تحديث نسخة الـ Gradle Plugin
        if [ -f "android/build.gradle" ]; then
          sed -i 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.9.1/g' android/build.gradle
        fi
        
        echo "android.suppressUnsupportedCompileSdk=36" >> android/gradle.properties
        echo "android.experimental.privacySandboxSdk.enable=false" >> android/gradle.properties

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # تحسين خطوة جلب مفتاح SHA1 لضمان الوصول للملف
    - name: Get SHA1 Key
      run: |
        if [ -f "android/gradlew" ]; then
          cd android
          chmod +x gradlew
          ./gradlew signingReport | grep -A 5 "Variant: debug" || true
        else
          echo "Error: gradlew not found in android directory"
          exit 1
        fi

    - name: Build APK (Debug)
      run: |
        cd android
        ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Abu-Zahra-Final-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
