name: Abu Al-Zahra Final Success Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── البحث عن الملف وتحديث الرابط في أي مكان يوجد فيه ──────────
      - name: Update Backend URL in Script
        run: |
          # هذا الأمر سيبحث عن أي ملف index.html في المشروع ويستبدل الرابط بداخله
          find . -name "index.html" -exec sed -i "s|const REPLIT_BACKEND_URL = .*|const REPLIT_BACKEND_URL = \"https://6e192a57-0450-4647-9b9d-f85380b0545b-00-10l45y2na70p9.sisko.replit.dev\";|g" {} +
          echo "✅ Backend URL updated in all found index.html files"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/cli@latest

      - name: Capacitor Sync
        run: |
          # سنقوم بإنشاء مجلد www وهمي فقط لإرضاء Capacitor إذا لم يكن موجوداً
          if [ ! -d "www" ]; then mkdir www; fi
          if [ -f "index.html" ]; then cp index.html www/; fi
          if [ -d "public" ]; then cp -r public/* www/; fi
          npx cap sync android

      - name: Create Google Services File
        run: |
          mkdir -p android/app
          cat > android/app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "982107544824",
              "project_id": "call-now-24582",
              "storage_bucket": "call-now-24582.firebasestorage.app"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:982107544824:android:abuzahra00000001",
                  "android_client_info": { "package_name": "com.munir.abuzahra" }
                },
                "api_key": [{ "current_key": "AIzaSyD8hrO2kX1zXaA46PImzMGqOt4iTwhXKI0" }],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": [{ "client_id": "982107544824-web.apps.googleusercontent.com", "client_type": 3 }]
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Force Fix Android Variables
        run: |
          cat > android/variables.gradle << 'EOF'
          ext {
              minSdkVersion = 24
              compileSdkVersion = 35
              targetSdkVersion = 35
          }
          EOF

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build APK (Debug)
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AbuZahra-Final-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
