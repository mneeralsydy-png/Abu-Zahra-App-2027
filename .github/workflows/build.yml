name: Abu Al-Zahra Final Success Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout Code ─────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── تحديث رابط السيرفر فقط داخل الملف ──────────────────────────
      - name: Update Backend URL in Script
        run: |
          # سيقوم هذا الأمر بالبحث عن السطر الذي يحتوي على REPLIT_BACKEND_URL وتحديثه بالرابط الجديد
          sed -i "s|const REPLIT_BACKEND_URL = .*|const REPLIT_BACKEND_URL = \"https://6e192a57-0450-4647-9b9d-f85380b0545b-00-10l45y2na70p9.sisko.replit.dev\";|g" index.html
          echo "✅ Backend URL updated in index.html"

      # ── Set up Node.js 22 ─────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── Install Dependencies ──────────────────────────────────────
      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/cli@latest

      # ── Capacitor Sync ────────────────────────────────────────────
      - name: Capacitor Sync
        run: |
          # مزامنة الملفات مع مجلد أندرويد مباشرة
          npx cap sync android

      # ── Create Google Services File ───────────────────────────────
      - name: Create Google Services File
        run: |
          mkdir -p android/app
          cat > android/app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "982107544824",
              "project_id": "call-now-24582",
              "storage_bucket": "call-now-24582.firebasestorage.app"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:982107544824:android:abuzahra00000001",
                  "android_client_info": {
                    "package_name": "com.munir.abuzahra"
                  }
                },
                "api_key": [
                  { "current_key": "AIzaSyD8hrO2kX1zXaA46PImzMGqOt4iTwhXKI0" }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": [
                      { "client_id": "982107544824-web.apps.googleusercontent.com", "client_type": 3 }
                    ]
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF
          echo "✅ google-services.json created"

      # ── Force Fix Android Variables ───────────────────────────────
      - name: Force Fix Android Variables
        run: |
          cat > android/variables.gradle << 'EOF'
          ext {
              minSdkVersion = 24
              compileSdkVersion = 35
              targetSdkVersion = 35
          }
          EOF
          echo "✅ Android variables fixed"

      # ── Set up JDK 21 ─────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # ── Build APK (Debug) ─────────────────────────────────────────
      - name: Build APK (Debug)
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug --no-daemon

      # ── Upload APK Artifact ───────────────────────────────────────
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AbuZahra-App-Build-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
