name: Build Android APK (Private Dialer)

on:
  push:
    branches: [ main, master, dev ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install Dependencies
      run: |
        npm install
        npm install @capacitor/core @capacitor/cli @capacitor/android typescript -D

    - name: Capacitor Sync
      run: |
        rm -rf android
        npx cap init "Private Dialer" "com.privatedialer.app" --web-dir public --noprompt || true
        npx cap add android
        npx cap sync android

    - name: Fix Android SDK Versions
      run: |
        # هذا الأمر يقوم بتحديث إصدار الـ SDK إلى 36 وإصدار الأدوات ليتوافق مع المكتبات الجديدة
        sed -i 's/compileSdkVersion = [0-9]*/compileSdkVersion = 36/g' android/variables.gradle
        sed -i 's/targetSdkVersion = [0-9]*/targetSdkVersion = 36/g' android/variables.gradle
        # تحديث إصدار Gradle Plugin ليتوافق مع متطلبات المكتبة
        sed -i 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.9.1/g' android/build.gradle || echo "Done"

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build APK (Debug)
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Private-Dialer-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
