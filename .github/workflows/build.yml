name: Abu Al-Zahra Final Success Build

on:
  push:
    branches: [ main, master ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install Capacitor CLI
      run: |
        npm install
        # تثبيت الأدوات محلياً لضمان وجود npx
        npm install @capacitor/cli @capacitor/core @capacitor/android

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Force SDK 36 Compatibility
      run: |
        # التأكد من أن الإعدادات التي رفعناها من ريبلت تدعم الإصدار 36
        echo "ext { compileSdkVersion = 36; targetSdkVersion = 36 }" > android/variables.gradle
        echo "android.suppressUnsupportedCompileSdk=36" >> android/gradle.properties

    - name: Build APK (Debug)
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Get SHA1 Key
      if: always()
      run: |
        cd android
        ./gradlew signingReport | grep -A 5 "Variant: debug" || true

    - name: Upload Final APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: Abu-Zahra-App-Final
        path: android/app/build/outputs/apk/debug/app-debug.apk
