name: Build Android APK (Final Stable Success)

on:
  push:
    branches: [ main, master, dev ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x

    - name: Install Dependencies
      run: |
        npm install
        npm install @capacitor/core @capacitor/cli @capacitor/android typescript -D

    - name: Capacitor Sync & Prep
      run: |
        # إنشاء مجلد الويب لضمان نجاح كاباسيتور
        mkdir -p public
        echo "<html></html>" > public/index.html
        rm -rf android
        npx cap init "Abu Al-Zahra VoIP" "com.munir.abuzahra" --web-dir public --noprompt || true
        npx cap add android
        npx cap sync android

    - name: Create Google Services File
      run: |
        mkdir -p android/app
        echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

    - name: Force Upgrade SDK & Plugin
      run: |
        cat <<EOF > android/variables.gradle
        ext {
            minSdkVersion = 23
            compileSdkVersion = 36
            targetSdkVersion = 36
            coreSplashScreenVersion = '1.0.1'
        }
        EOF
        sed -i 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.9.1/g' android/build.gradle
        echo "android.suppressUnsupportedCompileSdk=36" >> android/gradle.properties

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # استخراج SHA-1 (ضروري جداً لحل مشكلة الاتصال بالخادم)
    - name: Get SHA1 Key
      run: |
        cd android
        chmod +x gradlew
        ./gradlew signingReport | grep -A 5 "Variant: debug" || true

    - name: Build APK (Debug)
      run: |
        cd android
        ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: Abu-Zahra-Final-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
