name: Build Android APK (Final Fix)

on:
  push:
    branches: [ main, master, dev ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x

    - name: Install Dependencies
      run: |
        npm install
        npm install @capacitor/core @capacitor/cli @capacitor/android typescript -D

    - name: Capacitor Setup
      run: |
        mkdir -p public
        echo "<html><body>Abu Al-Zahra</body></html>" > public/index.html
        rm -rf android
        # التعديل الجوهري هنا لمطابقة اسم الحزمة
        npx cap init "Abu Al-Zahra" "com.munir.abuzahra" --web-dir public --noprompt || true
        npx cap add android
        npx cap sync android

    - name: Create Google Services File
      run: |
        mkdir -p android/app
        echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Build APK (Debug)
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Get SHA1 Key
      if: always()
      run: |
        cd android
        ./gradlew signingReport | grep -A 5 "Variant: debug" || true
